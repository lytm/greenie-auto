; PlatformIO Project Configuration File
; greenie-auto — Dự án đo độ ẩm với c

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Tốc độ Serial Monitor
monitor_speed = 115200

; Upload port (set your ESP32 serial port, e.g. COM3, COM4)
upload_port = COM4

; Thư viện cần thiết
lib_deps =
    tzapu/WiFiManager @ ^2.0.17

; ─ Firebase credentials ─ điền vào đây, không sửa main.cpp
build_flags =
    -D FIREBASE_SECRET='"snfra6Wh6FaJyuR13evbnkAkmi1a0Nbt6Xz3AtHZ"'
    -D FIREBASE_URL='"https://greenie-auto-default-rtdb.asia-southeast1.firebasedatabase.app"'
